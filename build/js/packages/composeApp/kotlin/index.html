<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic – Gym Management Demo</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0F172A;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        #compose-target { width: 100%; height: 100%; }

        /* Loading splash shown before WASM is ready */
        #kinetic-splash {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0F172A; color: #CBD5E1; z-index: 9999;
            gap: 16px;
        }
        #kinetic-splash h1 { color: #2DD4BF; font-size: 1.6rem; margin: 0; letter-spacing: 2px; }
        #kinetic-splash p  { margin: 0; font-size: 0.85rem; opacity: 0.6; }
        #kinetic-splash .dot-row { display: flex; gap: 8px; margin-top: 8px; }
        #kinetic-splash .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #2DD4BF;
            animation: bounce 1.2s infinite ease-in-out;
        }
        #kinetic-splash .dot:nth-child(2) { animation-delay: .2s; }
        #kinetic-splash .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: .3; }
            40%            { transform: scale(1); opacity: 1;  }
        }
    </style>
</head>
<body>
    <!-- Loading splash: hidden once Compose mounts -->
    <div id="kinetic-splash">
        <h1>KINETIC</h1>
        <p>Loading demo…</p>
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div id="compose-target"></div>

    <script>
        // ── Runtime configuration ────────────────────────────────────────────
        // DEMO_MODE: app runs entirely offline with mock data – no backend needed.
        // To point at a real backend, comment out DEMO_MODE and set API_BASE:
        //   window.__KINETIC_API_BASE__  = "https://your-backend.example.com";
        //   window.__KINETIC_ENV__       = "production";
        window.__KINETIC_DEMO_MODE__     = "true";

        // ── JS bridges called by Kotlin/Wasm via @JsName interop ────────────
        window.kineticGetConfig  = (key) => { const v = window[key]; return (v === undefined || v === null) ? null : String(v); };
        window.kineticGetOrigin  = () => window.location.origin;
        window.kineticGetHostname = () => window.location.hostname;

        // Hide splash safely (without patching requestAnimationFrame).
        // Some browsers (or Wasm startup paths) can behave oddly when RAF is monkeypatched.
        (function () {
            let done = false;
            function hideSplash() {
                if (done) return;
                done = true;
                const splash = document.getElementById('kinetic-splash');
                if (!splash) return;
                splash.style.transition = 'opacity .4s';
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 450);
            }

            // 1) If Compose writes anything into the mount, drop splash immediately.
            const mount = document.getElementById('compose-target');
            if (mount && 'MutationObserver' in window) {
                const obs = new MutationObserver(() => {
                    if (mount.childNodes && mount.childNodes.length > 0) hideSplash();
                });
                obs.observe(mount, { childList: true, subtree: true });
            }

            // 2) Always remove once the page is fully loaded.
            window.addEventListener('load', hideSplash, { once: true });

            // 3) Failsafe: never block UI forever (covers rare stalled loads).
            setTimeout(hideSplash, 3000);
        })();
    </script>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="qr-scanner-bridge.js"></script>
    <script src="composeApp.js"></script>
</body>
</html>

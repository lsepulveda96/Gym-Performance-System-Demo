<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym System SaaS</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0F172A;
        }
        #compose-target {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="compose-target"></div>
    <script>
        // Runtime config for public deployments (Netlify/Vercel).
        // Override these values in your hosted `index.html`.
        // window.__KINETIC_API_BASE__ = "https://your-backend.example.com";
        // window.__KINETIC_ENV__ = "production";
        // window.__KINETIC_DEMO_MODE__ = "true";
        window.kineticGetConfig = (key) => {
            const v = window[key];
            return v === undefined || v === null ? null : String(v);
        };
        window.kineticGetOrigin = () => window.location.origin;
        window.kineticGetHostname = () => window.location.hostname;
    </script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="qr-scanner-bridge.js"></script>
    <script src="composeApp.js"></script>
</body>
</html>
